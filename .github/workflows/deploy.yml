name: Deploy Spring Boot to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "target/productservice-0.0.1-SNAPSHOT.jar"
          target: "/home/ubuntu/"

      - name: Deploy and Restart Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          request_pty: true
          script: |
            set +e

            echo "Stopping old application..."
            PID=$(pgrep -f productservice-0.0.1-SNAPSHOT.jar)

            if [ -n "$PID" ]; then
              kill -9 $PID
              echo "Old process killed"
            else
              echo "No running process found"
            fi

            sleep 2

            echo "Replacing jar..."
            cp /home/ubuntu/target/productservice-0.0.1-SNAPSHOT.jar /home/ubuntu/productservice-0.0.1-SNAPSHOT.jar

            echo "Starting new application..."
            cd /home/ubuntu
            nohup java -jar productservice-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
            disown $!

            sleep 3
            echo "Verifying process started..."
            pgrep -f productservice-0.0.1-SNAPSHOT.jar && echo "App is running!" || echo "WARNING: App may not have started"

            echo "Deployment completed"