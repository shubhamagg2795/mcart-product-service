name: MCart Product Service CI/CD Pipeline

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-product-service
  cancel-in-progress: true

jobs:

  trigger-detection:
    name: "Stage 1 — Trigger & Change Detection"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print commit info
        run: |
          echo "Service  : Product Service"
          echo "Branch   : ${{ github.ref_name }}"
          echo "Commit   : ${{ github.sha }}"
          echo "Author   : ${{ github.actor }}"
          echo "Message  : ${{ github.event.head_commit.message }}"

  build:
    name: "Stage 2 — Build & Compile"
    runs-on: ubuntu-latest
    needs: trigger-detection
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Build JAR
        run: mvn clean package -DskipTests -q
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: product-jar
          path: target/*.jar
          retention-days: 1
      - name: Print build info
        run: ls -lh target/*.jar

  unit-test:
    name: "Stage 3 — Unit Tests"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Run unit tests
        run: mvn test -q || true

  security-scan:
    name: "Stage 4 — Security Scan (SAST)"
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Dependency vulnerability check
        run: mvn dependency:analyze -q || true
      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          grep -r "password\s*=" src/ --include="*.java" | grep -v "test" | grep -v "//" || echo "No hardcoded secrets found - clean"

  integration-test:
    name: "Stage 5 — Integration Test"
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Check EC2 connectivity
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}/health || echo "000")
          echo "EC2 Gateway status: $STATUS"

  docker-build-push:
    name: "Stage 6 — Build & Push Docker Image"
    runs-on: ubuntu-latest
    needs: integration-test
    steps:
      - uses: actions/checkout@v4
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: product-jar
          path: target/
      - name: Copy JAR to root
        run: cp target/*.jar app.jar
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mcart-product-service:latest
            ${{ secrets.DOCKER_USERNAME }}/mcart-product-service:${{ github.sha }}

  deploy:
    name: "Stage 7 — Deploy to EC2"
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Pull and restart on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/mcart
            docker pull ${{ secrets.DOCKER_USERNAME }}/mcart-product-service:latest
            docker-compose up -d --no-deps product-service
            docker image prune -f
            echo "Product Service deployed at $(date)"

  docker-verify:
    name: "Stage 8 — Verify Container Running"
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Check container status
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/mcart
            docker-compose ps product-service

  smoke-test:
    name: "Stage 9 — Smoke Test"
    runs-on: ubuntu-latest
    needs: docker-verify
    steps:
      - name: Wait for service
        run: sleep 20
      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}/api/version || echo "000")
          echo "Product Service status: $STATUS"
          [ "$STATUS" = "200" ] && echo "PASSED" || echo "WARNING: $STATUS"

  notify-summary:
    name: "Stage 10 — Notify & Summary"
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - name: Deployment summary
        run: |
          echo "========================================"
          echo "  Product Service Deployment Complete!"
          echo "  Image  : ${{ secrets.DOCKER_USERNAME }}/mcart-product-service:latest"
          echo "  Commit : ${{ github.sha }}"
          echo "  Time   : $(date -u)"
          echo "========================================"
