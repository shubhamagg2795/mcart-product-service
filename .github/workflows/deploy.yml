name: MCart Product Service CI/CD Pipeline

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-product-service
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────
  # STAGE 1 — Trigger & Change Detection
  # ─────────────────────────────────────────────
  trigger-detection:
    name: "Stage 1 — Trigger & Change Detection"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print commit info
        run: |
          echo "Service  : Product Service"
          echo "Branch   : ${{ github.ref_name }}"
          echo "Commit   : ${{ github.sha }}"
          echo "Author   : ${{ github.actor }}"
          echo "Message  : ${{ github.event.head_commit.message }}"
          echo "Changed files:"
          git diff --name-only HEAD~1 HEAD || echo "Initial commit"

  # ─────────────────────────────────────────────
  # STAGE 2 — Build & Compile
  # ─────────────────────────────────────────────
  build:
    name: "Stage 2 — Build & Compile"
    runs-on: ubuntu-latest
    needs: trigger-detection
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: product-jar
          path: target/*.jar
          retention-days: 1

      - name: Print build info
        run: ls -lh target/*.jar

  # ─────────────────────────────────────────────
  # STAGE 3 — Unit Tests
  # ─────────────────────────────────────────────
  unit-test:
    name: "Stage 3 — Unit Tests"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run unit tests
        run: mvn test -q || true

  # ─────────────────────────────────────────────
  # STAGE 4 — Security Scan (SAST)
  # ─────────────────────────────────────────────
  security-scan:
    name: "Stage 4 — Security Scan (SAST)"
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Dependency vulnerability check
        run: mvn dependency:analyze -q || true

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          if grep -r "password\s*=\s*['\"][^$]" src/ --include="*.java" | grep -v "test" | grep -v "//" ; then
            echo "WARNING: Possible hardcoded passwords found"
          else
            echo "No hardcoded secrets found - clean"
          fi

  # ─────────────────────────────────────────────
  # STAGE 5 — Integration Test
  # ─────────────────────────────────────────────
  integration-test:
    name: "Stage 5 — Integration Test"
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Check EC2 backend connectivity
        run: |
          echo "Checking if EC2 backend is reachable..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.EC2_HOST }}/health || echo "000")
          echo "EC2 Gateway status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Backend is reachable"
          else
            echo "Backend unreachable - continuing anyway"
          fi

  # ─────────────────────────────────────────────
  # STAGE 6 — Build Docker Image
  # ─────────────────────────────────────────────
  docker-build:
    name: "Stage 6 — Build Docker Image"
    runs-on: ubuntu-latest
    needs: integration-test
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: product-jar
          path: target/

      - name: Build Docker image
        run: |
          docker build -t mcart-product-service:${{ github.sha }} .
          docker tag mcart-product-service:${{ github.sha }} mcart-product-service:latest
          echo "Docker image built successfully"
          docker images mcart-product-service

  # ─────────────────────────────────────────────
  # STAGE 7 — Deploy JAR to EC2
  # ─────────────────────────────────────────────
  deploy:
    name: "Stage 7 — Deploy to EC2"
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: product-jar
          path: target/

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/mcart/mcart-product-service/"
          strip_components: 1

      - name: Rename to app.jar
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/mcart/mcart-product-service
            mv *.jar app.jar 2>/dev/null || true
            echo "Product JAR deployed to EC2 at $(date)"

  # ─────────────────────────────────────────────
  # STAGE 8 — Docker Build & Restart
  # ─────────────────────────────────────────────
  docker-restart:
    name: "Stage 8 — Docker Build & Restart"
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Rebuild and restart container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/mcart
            docker-compose build product-service
            docker-compose up -d --no-deps product-service
            echo "Product Service restarted at $(date)"
            docker-compose ps product-service

  # ─────────────────────────────────────────────
  # STAGE 9 — Smoke Test
  # ─────────────────────────────────────────────
  smoke-test:
    name: "Stage 9 — Smoke Test"
    runs-on: ubuntu-latest
    needs: docker-restart
    steps:
      - name: Wait for service to start
        run: sleep 20

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.EC2_HOST }}/api/version || echo "000")
          echo "Product Service status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "PASSED - Product Service is healthy"
          else
            echo "WARNING - Service returned $STATUS"
          fi

  # ─────────────────────────────────────────────
  # STAGE 10 — Notify & Summary
  # ─────────────────────────────────────────────
  notify-summary:
    name: "Stage 10 — Notify & Summary"
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - name: Deployment summary
        run: |
          echo "========================================"
          echo "  Product Service Deployment Complete!"
          echo "========================================"
          echo "  Service : Product Service"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Author  : ${{ github.actor }}"
          echo "  Message : ${{ github.event.head_commit.message }}"
          echo "  Time    : $(date -u)"
          echo "  URL     : http://${{ secrets.EC2_HOST }}/api/version"
          echo "========================================"
